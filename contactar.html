<!DOCTYPE html>
<html lang="Spanish">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicite una llamada • Carilar</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

 <nav class="navbar">
   <div class="nav1">
     <img src="../images/CarilarLOGO.png" alt="Carilar Logo" class="carilar">
  </div>
 </nav>

<section class="form-section">

  <div class="form-card">

    <h1>Solicite su llamada</h1>
    <p class="subtitle">
      Cuentenos un poco sobre su negocio.<br>Responderemos pronto.
    </p>

    <form action="https://api.staticforms.xyz/submit" method="POST" class="contact-form">

      <label>Nombre Completo *</label>
      <input type="text" name="name" required>

      <label>Nombre de su Negocio *</label>
      <input type="text" name="company" required>

      <label>Correo Electrónico *</label>
      <input type="email" name="email" required>

      <label>Número Telefónico *</label>
      <input type="tel" name="phone" required pattern="[0-9]{10}" placeholder="Número telefónico - 10 dígitos">
      
      <label>¿Cuál es el mayor problema con tu punto de venta actual? *</label>

      <div>
        <label><input type="radio" name="issue" value="Las comisiones son muy altas" required> Las comisiones son muy altas</label><br>
        <label><input type="radio" name="issue" value="El sistema es complicado"> El sistema es complicado</label><br>
        <label><input type="radio" name="issue" value="El servicio al cliente es pesimo"> El servicio al cliente es pesimo</label><br>
        <label><input type="radio" name="issue" value="Problemas con reportes/inventario"> Problemas con reportes/inventario</label><br>
        <label><input type="radio" name="issue" value="Solo explorando opciones"> Solo explorando opciones</label><br>
        <label><input type="radio" name="issue" value="Other" id="issue-other"> Otro</label>
     </div>

      <!-- Hidden field -->
    <div id="issue-other-text" style="display:none; margin-top:8px;">
       <input type="text" name="issue_other" placeholder="Por favor especifique" id="issue-other-input">
    </div>

       <label>Punto de venta actual: *</label>

      <div>
        <label><input type="radio" name="POS" value="Square" required> Square</label><br>
        <label><input type="radio" name="POS" value="Focus"> Focus</label><br>
        <label><input type="radio" name="POS" value="Toast"> Toast</label><br>
        <label><input type="radio" name="POS" value="Clover"> Clover</label><br>
        <label><input type="radio" name="POS" value="Solo efectivo (Zelle, CashAspp, Venmo, Paypal)"> Solo efectivo (Zelle, CashAspp, Venmo, Paypal)</label><br>
        <label><input type="radio" name="POS" value="I don't have a POS"> No tengo un POS</label><br>
        <label><input type="radio" name="POS" value="Other" id="pos-other"> Otro</label>
     </div>

     <!-- Hidden field -->
     <div id="pos-other-text" style="display:none; margin-top:8px;">
        <input type="text" name="pos_other" placeholder="Por favor especifique" id="pos-other-input">
     </div>

      <label>¿Cuál es tu volumen mensual promedio? *</label>

     <div>
        <label><input type="radio" name="volume" value="Menos de $5k" required> Menos de $5k</label><br>
        <label><input type="radio" name="volume" value="$5k–$20k"> $5k–$20k</label><br>
        <label><input type="radio" name="volume" value="$20k–$50k"> $20k–$50k</label><br>
        <label><input type="radio" name="volume" value=" $50k-$100k"> $50k-$100k</label><br>
        <label><input type="radio" name="volume" value="Mas de $100k"> Mas de $100k</label><br>
     </div>


      <label>¿Qué tan pronto buscas una solución? *</label>
      <div>
        <label><input type="radio" name="solution" value="Inmediatamente (esta semana)" required> Inmediatamente (esta semana)</label><br>
        <label><input type="radio" name="solution" value="Dentro de 30 días"> Dentro de 30 días</label><br>
        <label><input type="radio" name="solution" value="Solo exploro opciones"> Solo exploro opciones</label><br>
     </div>
      

      <input type="hidden" name="accessKey" value="sf_3f25858d898f8078e181b6f8">
      <input type="hidden" name="redirectTo" value="https://carilarpay.com/gracias.html">
      <input type="hidden" name="subject" value="New Lead - Carilar Pay">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="replyTo" value="carilarpay@gmail.com">
      <input type="text" name="honeypot" style="display:none">

      <button type="submit">Enviar →</button>

    </form>

  </div>
</section>

  
  <script src="script.js"></script>
</body>
</html>
