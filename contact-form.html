<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Call • Carilar Pay</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

 <nav class="navbar">
   <div class="nav1">
     <img src="../images/CarilarLOGO.png" alt="Carilar Logo" class="carilar">
  </div>
 </nav>

<section class="form-section">

  <div class="form-card">

    <h1>Request a Call</h1>
    <p class="subtitle">
      Tell us a little about your business.<br>We’ll reach out shortly.
    </p>

    <form action="https://formspree.io/f/mzdkgqje" method="POST" class="contact-form">

      <label>Your Full Name *</label>
      <input type="text" name="name" required>

      <label>Your Business Name *</label>
      <input type="text" name="company" required>

      <label>Business Email *</label>
      <input type="email" name="email" required>

      <label>Phone Number *</label>
      <input type="tel" name="phone" required pattern="[0-9]{10}" placeholder="10-digit phone number">

      
      <label>What is your biggest issue with your current point of sale? *</label>

      <div>
        <label><input type="radio" name="issue" value="Fees are too high" required> Fees are too high</label><br>
        <label><input type="radio" name="issue" value="System is confusing"> System is confusing</label><br>
        <label><input type="radio" name="issue" value="Slow checkout"> Slow checkout</label><br>
        <label><input type="radio" name="issue" value="Customer support sucks"> Customer support sucks</label><br>
        <label><input type="radio" name="issue" value="Reporting/inventory issues"> Reporting/inventory issues</label><br>
        <label><input type="radio" name="issue" value="Just exploring options"> Just exploring options</label><br>
        <label><input type="radio" name="issue" value="Other" id="issue-other"> Other</label>
     </div>

    <!-- Hidden field -->
    <div id="issue-other-text" style="display:none; margin-top:8px;">
       <input type="text" name="issue_other" placeholder="Please specify" id="issue-other-input">
    </div>

      <label>Current Point of Sale *</label>

      <div>
        <label><input type="radio" name="POS" value="Square" required> Square</label><br>
        <label><input type="radio" name="POS" value="Focus"> Focus</label><br>
        <label><input type="radio" name="POS" value="Toast"> Toast</label><br>
        <label><input type="radio" name="POS" value="Clover"> Clover</label><br>
        <label><input type="radio" name="POS" value="Cash only (Zelle, CashAspp, Venmo, Paypal)"> Cash only (Zelle, CashAspp, Venmo, Paypal)</label><br>
        <label><input type="radio" name="POS" value="I don't have a POS"> I don't have a POS</label><br>
        <label><input type="radio" name="POS" value="Other" id="pos-other"> Other</label>
     </div>

     <!-- Hidden field -->
     <div id="pos-other-text" style="display:none; margin-top:8px;">
        <input type="text" name="issue_other" placeholder="Please specify" id="pos-other-input">
     </div>

      
     <label>What is your average monthly volume? *</label>

     <div>
        <label><input type="radio" name="volume" value="Less than $5k" required> Less than $5k</label><br>
        <label><input type="radio" name="volume" value="$5k–$20k"> $5k–$20k</label><br>
        <label><input type="radio" name="volume" value="$20k–$50k"> $20k–$50k</label><br>
        <label><input type="radio" name="volume" value=" $50k-$100k"> $50k-$100k</label><br>
        <label><input type="radio" name="volume" value="More than $100k"> More than $100k</label><br>
     </div>
     

      <label>How soon are you looking for a solution? *</label>

      <div>
        <label><input type="radio" name="solution" value="Immediately (this week)" required> Immediately (this week)</label><br>
        <label><input type="radio" name="solution" value="Within 30 days"> Within 30 days</label><br>
        <label><input type="radio" name="solution" value="Just exploring options"> Just exploring options</label><br>
     </div>
      

      <input type="hidden" name="_next" value="https://carilarpay.com/thankyou.html">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Submit →</button>

    </form>

  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
